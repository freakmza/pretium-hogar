<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1C2A20">
  <meta name="description" content="PRETIUM HOGAR organiza gastos del hogar, servicios, escuela y vencimientos.">
  <title>PRETIUM HOGAR</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-pretium-hogar.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="icon-pretium-hogar.svg" alt="" width="38" height="38">
      <div>
        <strong>PRETIUM HOGAR</strong>
        <span>Control del hogar</span>
      </div>
    </div>
    <nav class="nav" aria-label="Secciones">
      <button class="nav-item active" data-view="inicio"><span class="nav-icon">IN</span><span>Inicio</span></button>
      <button class="nav-item" data-view="hogar"><span class="nav-icon">GH</span><span>Gastos del hogar</span></button>
      <button class="nav-item" data-view="servicios"><span class="nav-icon">SV</span><span>Servicios</span></button>
      <button class="nav-item" data-view="escuela"><span class="nav-icon">ES</span><span>Escuela</span></button>
      <button class="nav-item" data-view="vencimientos"><span class="nav-icon">VC</span><span>Vencimientos</span></button>
      <button class="nav-item" data-view="reportes"><span class="nav-icon">RP</span><span>Reportes</span></button>
      <button class="nav-item" data-view="config"><span class="nav-icon">CF</span><span>Configuracion</span></button>
    </nav>
  </aside>

  <header class="topbar">
    <button id="menu-btn" class="icon-btn" aria-label="Abrir menu">☰</button>
    <div>
      <h1 id="page-title">Inicio</h1>
      <p id="page-subtitle">Resumen mensual del hogar</p>
    </div>
    <div class="top-actions">
      <select id="month-select" class="field compact" aria-label="Mes"></select>
      <button id="theme-btn" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema"><span class="theme-toggle-icon">D</span></button>
    </div>
  </header>

  <main class="main">
    <section id="view-inicio" class="view active"></section>
    <section id="view-hogar" class="view"></section>
    <section id="view-servicios" class="view"></section>
    <section id="view-escuela" class="view"></section>
    <section id="view-vencimientos" class="view"></section>
    <section id="view-reportes" class="view"></section>
    <section id="view-config" class="view"></section>
  </main>

  <div id="toast-wrap" class="toast-wrap" aria-live="polite"></div>
  <div id="login-overlay" class="login-overlay" hidden>
    <form id="login-form" class="login-box">
      <div class="login-brand">
        <img src="icon-pretium-hogar.svg" alt="" width="44" height="44">
        <div>
          <strong>PRETIUM HOGAR</strong>
          <span>Ingresar al sistema</span>
        </div>
      </div>
      <label class="label">Usuario<input class="field" name="username" autocomplete="username" required></label>
      <label class="label">Contraseña<input class="field" type="password" name="password" autocomplete="current-password" required></label>
      <p id="login-error" class="login-error" hidden></p>
      <button id="login-submit" class="btn primary">Ingresar</button>
      <button id="demo-login-btn" class="btn" type="button" hidden>Entrar en demo local</button>
    </form>
  </div>
  <div id="modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="icon-btn" aria-label="Cerrar">×</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
